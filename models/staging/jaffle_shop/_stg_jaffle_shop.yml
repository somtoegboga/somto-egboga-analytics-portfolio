models:
  - name: stg_jaffle_shop_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: first_name
      - name: last_name

  - name: stg_jaffle_shop_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['completed', 'shipped', 'placed', 'return_pending', 'returned']

      - name: customer_id
        data_tests:
          - relationships:
              arguments: 
                to: ref('stg_jaffle_shop_customers')
                field: customer_id