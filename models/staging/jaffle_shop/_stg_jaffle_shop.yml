models:
  - name: stg_jaffle_shop_customers
    description: the grain of this table is one unique customer per row
    columns:
      - name: customer_id
        description: primary key for the customers table
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer.
      - name: last_name
        description: The last name of the customer.

  - name: stg_jaffle_shop_orders
    description: one order per row
    columns:
      - name: order_id
        description: primary key for the order table
        data_tests:
          - unique
          - not_null

      - name: order_status
        description: "{{doc('order_status')}}"
        data_tests:
          - accepted_values:
              arguments:
                values: ['completed', 'shipped', 'placed', 'return_pending', 'returned']

      - name: customer_id
        data_tests:
          - relationships:
              arguments: 
                to: ref('stg_jaffle_shop_customers')
                field: customer_id