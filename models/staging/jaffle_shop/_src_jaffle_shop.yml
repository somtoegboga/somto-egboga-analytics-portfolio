sources:
  - name: jaffle_shop # this is the name you want to refer to this source as when you reference it
    database: raw  
    schema: jaffle_shop  
    description: a clone of a postgress application database
      # for source freshness
    config:
      freshness:
        #warn_after: # when dbt will give a warning that the data is getting stale
          #count: 6
          #period: hour
        error_after: # when dbt will throw up an error that the data is critically outdated
          count: 1
          period: day
      loaded_at_field: _etl_loaded_at # column dbt will use to check the last load time
    tables:
      - name: orders
        description: raw orders data
        columns:
          - name: id 
            description: primary key for the orders table
            data_tests:
              - unique 
              - not_null
              
      - name: customers
        description: raw customers data
        columns:
          - name: id 
            description: primary key for the customers data
            data_tests:
              - unique
              - not_null
              
        config:
          freshness: null # because the loaded at field columns doesnt exist here

  - name: stripe # this is the name you want to refer to this source as when you reference it
    database: raw 
    schema: stripe
    description: this is a clone of a postgress application database
    tables:
      - name: payment
        columns:
          - name: id 
            description: primary key for the payment data
            data_tests:
              - unique
              - not_null 
        config:
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 24
              period: hour
          loaded_at_field: _batched_at